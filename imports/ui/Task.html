<!-- imports/ui/Task.html -->
<template name="task">
  <li class="task-item">
    <input type="checkbox" checked="{{isChecked}}">
    {{#if category}}
      <span class="category-badge {{categoryClass}}">{{category}}</span>
    {{/if}}
    <span class="task-text {{#if isChecked}}strike{{/if}}">{{text}}</span>
    <button class="delete-btn delete">&times;</button>
  </li>
</template>
