<!-- imports/ui/App.html -->
<template name="mainContainer">
  <div class="container">
    {{#if currentUser}}
      <header class="header">
        <h1>Todo List</h1>
        <button class="logout-btn">Logout</button>
      </header>

      <form class="task-form">
        <input type="text" name="text" placeholder="Type a new task" />
        <button type="submit">Add Task</button>
      </form>

      <div class="filter-bar">
        <span>{{pendingTasksCount}} task(s) remaining</span>
        <button class="hide-completed">{{#if hideCompleted}}Show All{{else}}Hide Completed{{/if}}</button>
      </div>

      {{#if isLoading}}
        <p>Loading...</p>
      {{else}}
        <ul class="task-list">
          {{#each tasks}}
            {{> task}}
          {{/each}}
        </ul>
      {{/if}}
    {{else}}
      {{> login}}
    {{/if}}
  </div>
</template>
